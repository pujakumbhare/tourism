<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Explorer - Booking</title>
<link rel="stylesheet" href="f.css">
</head>
<body>

<div class="booking-container">

    <div class="booking-image">
        <div class="overlay">
            <h1>Book Your Dream Tour</h1>
            <p>Explore the world with Nature Explorer</p>
        </div>
    </div>

    <div class="booking-form">

        <h2>Tour Booking Form</h2>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="tel" placeholder="Mobile Number" required>

            <select required>
                <option value="">Select Destination</option>
                <option>Swiss Alps</option>
                <option>Maldives</option>
                <option>Bali</option>
                <option>Paris</option>
                <option>Dubai</option>
                <option>Goa</option>
            </select>

            <input type="number" placeholder="Number of Travelers" min="1" required>

            <input type="date" required>

            <textarea rows="4" placeholder="Special Requests"></textarea>

            <button type="submit">Book Now</button>

        </form>

    </div>

</div>

</body>
</html>
