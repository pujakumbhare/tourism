<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Nature Explorer</title>
    <link rel="stylesheet" href="e.css">
</head>
<body>

<section class="contact-section">

    <div class="contact-container">

        <div class="contact-info">
            <h1>Contact Us</h1>
            <p>
                Have questions about our tours and destinations?
                We'd love to hear from you. Send us a message and
                we'll respond as soon as possible.
            </p>

            <div class="details">
                <p>📍 Nature Explorer Travel Agency</p>
                <p>📞 +91 98765 43210</p>
                <p>✉ info@natureexplorer.com</p>
            </div>
        </div>

        <div class="contact-form">

            <form>
                <div class="input-box">
                    <input type="text" placeholder="Enter Your Name" required>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Enter Your Email" required>
                </div>

                <div class="input-box">
                    <input type="tel" placeholder="Enter Mobile Number" required>
                </div>

                <div class="input-box">
                    <textarea rows="5" placeholder="Enter Your Message" required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>

        </div>

    </div>

</section>

</body>
</html>
